name: 🔄 Actualizar Trends cada hora

on:
  schedule:
    # Ejecuta cada hora a las :00 minutos (UTC)
    - cron: '0 * * * *'
  # También permite ejecución manual desde GitHub
  workflow_dispatch:
  # Ejecuta cuando hay push al repositorio
  push:
    branches:
      - main

jobs:
  update-trends:
    runs-on: ubuntu-latest
    
    steps:
      # Paso 1: Descargar el código del repositorio
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # Paso 2: Configurar Python
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Paso 3: Instalar dependencias (si las necesita)
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      # Paso 4: Ejecutar el script que obtiene trends
      - name: 🔥 Obtener trends reales
        run: python scripts/get_trends.py

      # Paso 5: Verificar que el archivo se creó
      - name: ✅ Verificar archivo de datos
        run: |
          if [ -f trends-data.json ]; then
            echo "✅ Archivo trends-data.json creado correctamente"
            cat trends-data.json
          else
            echo "❌ Error: archivo no encontrado"
            exit 1
          fi

      # Paso 6: Guardar cambios en Git
      - name: 💾 Guardar cambios
        run: |
          git config user.name "Trends Bot"
          git config user.email "trends-bot@github.com"
          git add trends-data.json
          git commit -m "🔄 Actualizar trends - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "Sin cambios"
          git push origin main || echo "Sin cambios para pushear"

      # Paso 7: Notificación de éxito
      - name: 🎉 Éxito
        run: echo "✅ Trends actualizados exitosamente a las $(date)"

      # Paso 8: Notificación de error (si algo falla)
      - name: ⚠️ Error
        if: failure()
        run: echo "❌ Error al actualizar trends"
