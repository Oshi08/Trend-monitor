<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trends Monitor - Datos REALES actualizados cada hora">
    <meta name="theme-color" content="#1a73e8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trends Monitor">
    <link rel="manifest" href="manifest.json">
    <title>🔥 Trends Monitor - DATOS REALES</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a73e8;
            --danger: #d33c27;
            --success: #188038;
            --warning: #f57c00;
            --bg: #ffffff;
            --bg-secondary: #f8f9fa;
            --text: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-secondary);
            color: var(--text);
            overflow-x: hidden;
        }
        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, #0d47a1 100%);
            color: white;
            padding: 16px;
            padding-top: max(16px, env(safe-area-inset-top));
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .app-header h1 {
            font-size: 22px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .container { max-width: 800px; margin: 0 auto; padding: 12px; padding-bottom: 100px; }
        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex-shrink: 0;
            padding: 8px 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        .metric-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
        .metric-value { font-size: 24px; font-weight: 700; color: var(--primary); }
        .trends-container { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .trend-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            border-left: 4px solid var(--primary);
        }
        .trend-name { font-size: 14px; font-weight: 600; color: var(--text); margin: 8px 0; }
        .trend-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
        .trend-category {
            display: inline-block;
            background: var(--warning);
            color: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }
        .viralidad-bar {
            width: 100%;
            height: 6px;
            background: var(--bg-secondary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .viralidad-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--warning));
        }
        .viralidad-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .trend-stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }
        .stat {
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 4px;
            text-align: center;
            font-size: 10px;
        }
        .stat-value { font-weight: 600; font-size: 12px; color: var(--primary); }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding-bottom: max(8px, env(safe-area-inset-bottom));
            z-index: 99;
        }
        .nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 24px;
            text-align: center;
            color: var(--text-secondary);
        }
        .nav-btn.active { color: var(--primary); }
        .real-data-badge {
            display: inline-block;
            background: var(--success);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .btn {
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            margin: 12px 0;
        }
    </style>
</head>
<body>
    <div class="app-header">
        <h1>
            <span class="status-dot"></span>
            🔥 Trends Monitor REAL
        </h1>
        <p>Datos actualizados cada hora</p>
        <button class="btn" onclick="recargarDatos()">🔄 Recargar</button>
    </div>

    <div class="container">
        <div class="real-data-badge">✅ Datos REALES</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('resumen', this)">📊</button>
            <button class="tab-btn" onclick="switchTab('todos', this)">🔥</button>
            <button class="tab-btn" onclick="switchTab('restaurantes', this)">🍽️</button>
            <button class="tab-btn" onclick="switchTab('bares', this)">🍹</button>
            <button class="tab-btn" onclick="switchTab('cafeterias', this)">☕</button>
            <button class="tab-btn" onclick="switchTab('reposteria', this)">🍰</button>
        </div>

        <div id="resumen" class="tab-content active">
            <div class="analytics-grid">
                <div class="metric-card">
                    <div class="metric-label">📊 Total</div>
                    <div class="metric-value" id="totalTrends">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">🔥 Más viral</div>
                    <div class="metric-value" id="trendMasViral" style="font-size: 14px;">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">⚡ Promedio</div>
                    <div class="metric-value" id="promedio">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">🕐 Actualizado</div>
                    <div class="metric-value" id="lastUpdate" style="font-size: 12px;">-</div>
                </div>
            </div>
            <h2 style="font-size: 14px; margin: 16px 0 8px; color: var(--text);">🔥 Top Trends</h2>
            <div id="topTrends" class="trends-container"></div>
        </div>

        <div id="todos" class="tab-content">
            <div id="allTrends" class="trends-container"></div>
        </div>

        <div id="restaurantes" class="tab-content">
            <div id="trendsRestaurantes" class="trends-container"></div>
        </div>

        <div id="bares" class="tab-content">
            <div id="trendsBares" class="trends-container"></div>
        </div>

        <div id="cafeterias" class="tab-content">
            <div id="trendsCafeterias" class="trends-container"></div>
        </div>

        <div id="reposteria" class="tab-content">
            <div id="trendsReposteria" class="trends-container"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-btn active" onclick="switchTabNav('resumen')">📊</button>
        <button class="nav-btn" onclick="switchTabNav('todos')">🔥</button>
        <button class="nav-btn" onclick="switchTabNav('restaurantes')">🍽️</button>
        <button class="nav-btn" onclick="switchTabNav('bares')">🍹</button>
        <button class="nav-btn" onclick="switchTabNav('cafeterias')">☕</button>
        <button class="nav-btn" onclick="switchTabNav('reposteria')">🍰</button>
    </div>

    <script>
        let allTrends = [];

        const TRENDS_DEFAULT = [
            {
                "nombre": "ASMR bebidas + hielo (Muy viral ahora)",
                "categoria": "Bares",
                "descripcion": "Close-up de hielo cayendo + sonido puro",
                "viralidad": 97,
                "formato": "Reel 5-10s",
                "sonido": "Natural",
                "hashtags": "#ASMR #Viral",
                "menciones": 6800,
                "videos": 3200,
                "source": "TikTok"
            },
            {
                "nombre": "Postres brutales bordes quemados",
                "categoria": "Repostería",
                "descripcion": "Pasteles desordenados y quemados",
                "viralidad": 96,
                "formato": "Reel 8-15s",
                "sonido": "Transiciones",
                "hashtags": "#PostreBrutal",
                "menciones": 5400,
                "videos": 2670,
                "source": "TikTok"
            },
            {
                "nombre": "Corte de carne en slow-motion viral",
                "categoria": "Restaurantes",
                "descripcion": "Videos de corte perfecto",
                "viralidad": 92,
                "formato": "Reel 8-15s",
                "sonido": "ASMR",
                "hashtags": "#FoodViral",
                "menciones": 4200,
                "videos": 1850,
                "source": "Google"
            },
            {
                "nombre": "Cóctel con hielo seco explosivo",
                "categoria": "Bares",
                "descripcion": "Efecto visual épico",
                "viralidad": 94,
                "formato": "Reel 8-15s",
                "sonido": "Épica",
                "hashtags": "#ShowBar",
                "menciones": 4000,
                "videos": 1800,
                "source": "TikTok"
            },
            {
                "nombre": "Latte art perfecto trend 2026",
                "categoria": "Cafeterías",
                "descripcion": "Arte en café",
                "viralidad": 85,
                "formato": "Reel 10-15s",
                "sonido": "Aesthetic",
                "hashtags": "#LatteArt",
                "menciones": 2100,
                "videos": 950,
                "source": "Instagram"
            },
            {
                "nombre": "Galletas gigantes chocolate fundido",
                "categoria": "Repostería",
                "descripcion": "Galletas enormes",
                "viralidad": 95,
                "formato": "Reel 10-15s",
                "sonido": "ASMR",
                "hashtags": "#GalletaViral",
                "menciones": 4600,
                "videos": 2100,
                "source": "TikTok"
            }
        ];

        async function cargarDatos() {
            try {
                const response = await fetch('trends-data.json?t=' + Date.now());
                if (response.ok) {
                    const data = await response.json();
                    allTrends = data.trends || TRENDS_DEFAULT;
                } else {
                    allTrends = TRENDS_DEFAULT;
                }
            } catch (e) {
                console.log('Usando datos por defecto');
                allTrends = TRENDS_DEFAULT;
            }
            renderizar();
        }

        function crearTrendCard(trend) {
            const viralidad = Math.round(trend.viralidad * 10) / 10;
            return `
                <div class="trend-card">
                    <div style="margin-bottom: 8px;">
                        <span class="trend-category">${trend.categoria}</span>
                    </div>
                    <div class="trend-name">${trend.nombre}</div>
                    <div class="trend-desc">${trend.descripcion}</div>
                    <div class="viralidad-label">
                        <span>Viralidad</span>
                        <span style="font-weight: 600;">${viralidad}%</span>
                    </div>
                    <div class="viralidad-bar">
                        <div class="viralidad-fill" style="width: ${viralidad}%"></div>
                    </div>
                    <div class="trend-stats">
                        <div class="stat">
                            <div style="font-size: 10px; color: var(--text-secondary);">Menciones</div>
                            <div class="stat-value">${trend.menciones.toLocaleString()}</div>
                        </div>
                        <div class="stat">
                            <div style="font-size: 10px; color: var(--text-secondary);">Videos</div>
                            <div class="stat-value">${trend.videos.toLocaleString()}</div>
                        </div>
                        <div class="stat">
                            <div style="font-size: 10px; color: var(--text-secondary);">Fuente</div>
                            <div class="stat-value">${trend.source}</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderizar() {
            if (!allTrends || allTrends.length === 0) {
                allTrends = TRENDS_DEFAULT;
            }

            document.getElementById('totalTrends').textContent = allTrends.length;
            document.getElementById('trendMasViral').textContent = allTrends[0]?.nombre?.substring(0, 20) + '...' || '-';
            document.getElementById('promedio').textContent = Math.round(allTrends.reduce((a, b) => a + b.viralidad, 0) / allTrends.length) + '%';
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('es-ES', {hour: '2-digit', minute: '2-digit'});

            const top3 = allTrends.slice(0, 3).map(t => crearTrendCard(t)).join('');
            document.getElementById('topTrends').innerHTML = top3;

            const todos = allTrends.map(t => crearTrendCard(t)).join('');
            document.getElementById('allTrends').innerHTML = todos;

            ['Restaurantes', 'Bares', 'Cafeterías', 'Repostería'].forEach(cat => {
                const trends = allTrends.filter(t => t.categoria === cat);
                const html = trends.length > 0 ? trends.map(t => crearTrendCard(t)).join('') : '<div style="text-align: center; padding: 20px; color: var(--text-secondary);">No hay trends</div>';
                document.getElementById('trends' + cat).innerHTML = html;
            });
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
        }

        function switchTabNav(tabId) {
            switchTab(tabId, document.querySelector(`button[onclick="switchTab('${tabId}']`));
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function recargarDatos() {
            await cargarDatos();
            alert('✅ Datos recargados');
        }

        window.addEventListener('load', cargarDatos);
    </script>
</body>
</html>
