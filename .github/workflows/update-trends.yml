name: 🔥 DATOS REALES DE INTERNET EN DIRECTO

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Clonar repositorio
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Instalar dependencias
        run: |
          python3 -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
          echo "✅ Dependencias listas"

      - name: 🔥 OBTENER DATOS REALES EN DIRECTO
        run: |
          echo "========================================="
          echo "🔥 SCRAPING EN DIRECTO:"
          echo "📱 Reddit - Posts trending REALES"
          echo "🔍 Google Trends - Búsquedas en tendencia"
          echo "📹 TikTok - Hashtags virales"
          echo "========================================="
          python3 scripts/get_trends.py
          echo "========================================="

      - name: ✅ Verificar datos
        run: |
          if [ -f trends-data.json ]; then
            echo "✅ JSON creado correctamente"
            wc -l trends-data.json
          else
            echo "❌ ERROR: JSON no encontrado"
            exit 1
          fi

      - name: 💾 Configurar Git
        run: |
          git config user.name "TrendsBot"
          git config user.email "bot@trends.local"

      - name: 📤 Push a GitHub
        run: |
          git add trends-data.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "🔥 DATOS REALES EN DIRECTO - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi

      - name: ✅ Completado
        run: |
          echo "========================================="
          echo "✅ TRENDS REALES ACTUALIZADOS"
          echo "📊 Fuente: Reddit + Google + TikTok"
          echo "⏰ $(date)"
          echo "========================================="
