name: 🔄 Actualizar Trends cada hora

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-trends:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v2

      - name: 🐍 Python disponible
        run: python3 --version

      - name: 🔥 Ejecutar script de trends
        run: python3 scripts/get_trends.py

      - name: 💾 Guardar cambios en Git
        run: |
          git config user.name "Trends Bot"
          git config user.email "trends-bot@github.com"
          git add trends-data.json
          git commit -m "🔄 Actualizar trends - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "Sin cambios"
          git push origin main || echo "Sin cambios para pushear"

      - name: ✅ Completado
        run: echo "✅ Trends actualizados exitosamente"
