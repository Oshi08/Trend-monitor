name: 🔄 Actualizar Trends REALES cada hora

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-trends:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v2

      - name: 🐍 Instalar Python y librerías
        run: |
          python3 -m pip install --upgrade pip
          pip install pytrends requests beautifulsoup4 lxml
          echo "✅ Librerías instaladas"

      - name: 🔥 Obtener trends REALES
        run: |
          cd $GITHUB_WORKSPACE
          python3 scripts/get_trends.py

      - name: 📋 Verificar datos
        run: |
          if [ -f trends-data.json ]; then
            echo "✅ Archivo creado correctamente"
            ls -lh trends-data.json
            head -c 300 trends-data.json
            echo ""
          else
            echo "❌ ERROR: archivo no encontrado"
            exit 1
          fi

      - name: 💾 Guardar cambios
        run: |
          git config --global user.name "Trends Bot"
          git config --global user.email "trends-bot@github.com"
          git add trends-data.json
          git commit -m "🔄 Actualizar trends REALES - $(date +'%Y-%m-%d %H:%M:%S UTC')" || echo "Sin cambios"
          git push origin main || echo "No hay cambios"

      - name: ✅ Completado
        run: echo "✅ Trends actualizados exitosamente - $(date)"
