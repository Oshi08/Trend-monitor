name: 🔥 Obtener Trends REALES de Internet

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Instalar librerías
        run: |
          python3 -m pip install --upgrade pip
          pip install praw tweepy requests beautifulsoup4 lxml
          echo "✅ Librerías instaladas"

      - name: 🔥 BUSCAR TRENDS REALES
        run: |
          echo "======================================"
          echo "🔥 OBTENIENDO DATOS REALES DE:"
          echo "📱 Reddit, 🐦 Twitter, 📹 TikTok, 🌐 Web"
          echo "======================================"
          python3 scripts/get_trends.py

      - name: ✅ Verificar archivo
        run: |
          if [ -f trends-data.json ]; then
            echo "✅ Archivo creado correctamente"
            wc -l trends-data.json
          else
            echo "❌ ERROR"
            exit 1
          fi

      - name: 💾 Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 📤 Commit y Push
        run: |
          git add trends-data.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "🔥 Trends REALES - $(date +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin main
          fi

      - name: ✅ Completado
        run: echo "✅ Trends actualizados - $(date)"
